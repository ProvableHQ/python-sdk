[pytest]
pythonpath = python
testpaths = tests
markers =
    live: tests that hit the REAL testnet REST API / DEX API (run with -m live)
    slow: proving/funded write tests that spend real testnet funds (run with -m "live and slow")
    devnode: hermetic tests needing a local aleo-devnode binary (run with -m devnode)
addopts = -m "not live and not devnode"

asyncio_mode = auto
